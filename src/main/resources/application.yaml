spring:
  application:
    name: vehicle-management-api

  profiles:
    active: ${ENV:local}

  datasource:
    url: jdbc:postgresql://localhost:5432/vehicle_management
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379

  cache:
    type: redis
    redis:
      time-to-live: 5m
      cache-null-values: false

server:
  port: ${ENV_PORT:8080}
  servlet:
    context-path: /api

logging:
  level:
    root: INFO
    com.vehiclemanagement: DEBUG
    com.vehiclemanagement.client: DEBUG
    org.springframework.web: DEBUG
    org.springframework.cloud.openfeign: DEBUG
    feign: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

exchange:
  awesome:
    url: https://economia.awesomeapi.com.br

  frankfurter:
    url: https://api.frankfurter.app